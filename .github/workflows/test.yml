name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ vars.CI_UV_VERSION }}
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          uv sync --locked --all-extras --dev
          uv pip list

      - name: Run unit tests
        run: |
          uv run invoke ut

      - name: Run integration tests
        run: |
          uv run invoke it
